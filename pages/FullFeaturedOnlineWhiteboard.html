<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全功能在线白板</title>
    <style>
        :root {
            --primary: #1890ff;
            --danger: #ff4d4f;
            --success: #52c41a;
            --panel-bg: #ffffff;
        }
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #e8e8e8; font-family: sans-serif;
        }

        #app { display: flex; flex-direction: column; height: 100vh; }

        /* 工具栏 */
        header {
            background: var(--panel-bg);
            padding: 10px 15px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .group { display: flex; gap: 6px; align-items: center; border-right: 1px solid #eee; padding-right: 12px; }
        .group:last-child { border: none; }

        button {
            padding: 7px 14px; cursor: pointer; border: 1px solid #d9d9d9;
            background: white; border-radius: 4px; font-size: 13px;
            transition: 0.2s;
        }
        button:hover { border-color: var(--primary); color: var(--primary); }
        button.active { background: var(--primary); color: white; border-color: var(--primary); }

        .btn-clear { color: var(--danger); border-color: var(--danger); }
        .btn-clear:hover { background: var(--danger); color: white; }
        .btn-export { background: var(--success); color: white; border: none; }

        /* 画布 */
        #canvas-wrapper { flex: 1; width: 100%; height: 100%; position: relative; overflow: hidden; }
        canvas { display: block; background: white; }

        input[type="text"] { height: 32px; border: 1px solid #d9d9d9; border-radius: 4px; padding: 0 8px; width: 120px; }

        /* 浮动输入框样式 */
        #textInput {
            position: absolute;
            display: none;
            border: 1px dashed var(--primary);
            background: rgba(255,255,255,0.8);
            outline: none;
            padding: 2px;
            font-family: Arial;
            min-width: 50px;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="group">
            <button onclick="changeTool('brush', this)" class="tool-btn active">画笔</button>
            <button onclick="changeTool('rect', this)" class="tool-btn">矩形</button>
            <button onclick="changeTool('circle', this)" class="tool-btn">圆形</button>
            <button onclick="changeTool('text', this)" class="tool-btn">文字 (T)</button>
        </div>

        <div class="group">
            <input type="color" id="colorPicker" value="#000000" onchange="syncStyle()">
            <label style="font-size: 12px;">字号/粗细:</label>
            <input type="range" id="lineWidth" min="10" max="80" value="20" onchange="syncStyle()">
        </div>

        <div class="group">
            <button onclick="handleUndo()">撤销</button>
            <button class="btn-clear" onclick="clearAll()">清空</button>
        </div>

        <div class="group">
            <input type="text" id="filePrefix" placeholder="文件名">
            <select id="bgType">
                <option value="white">白色背景</option>
                <option value="transparent">透明背景</option>
            </select>
            <button class="btn-export" onclick="doExport()">导出图片</button>
        </div>

        <div class="group">
            <button onclick="saveJSON()">导出工程</button>
            <button onclick="document.getElementById('fileInput').click()">导入工程</button>
            <input type="file" id="fileInput" hidden accept=".json" onchange="loadJSON(this)">
        </div>
    </header>

    <div id="canvas-wrapper">
        <canvas id="paintCanvas"></canvas>
        <input type="text" id="textInput">
    </div>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvas-wrapper');
    const textInput = document.getElementById('textInput');

    let state = {
        tool: 'brush',
        isDrawing: false,
        objects: [],
        undoStack: [],
        config: { color: '#000000', size: 20 },
        tempObj: null,
        textPos: { x: 0, y: 0 }
    };

    function initCanvas() {
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
        draw();
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    function changeTool(type, btn) {
        state.tool = type;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // 切换工具时隐藏输入框
        hideTextInput();
    }

    function syncStyle() {
        state.config.color = document.getElementById('colorPicker').value;
        state.config.size = parseInt(document.getElementById('lineWidth').value);
    }

    // --- 文字输入处理 ---
    function showTextInput(x, y) {
        state.textPos = { x, y };
        textInput.style.display = 'block';
        textInput.style.left = x + 'px';
        textInput.style.top = (y - state.config.size/2) + 'px';
        textInput.style.fontSize = state.config.size + 'px';
        textInput.style.color = state.config.color;
        textInput.value = '';
        setTimeout(() => textInput.focus(), 50);
    }

    function hideTextInput() {
        textInput.style.display = 'none';
        textInput.value = '';
    }

    textInput.onkeydown = (e) => {
        if (e.key === 'Enter') {
            if (textInput.value.trim() !== '') {
                state.undoStack.push(JSON.stringify(state.objects));
                state.objects.push({
                    type: 'text',
                    text: textInput.value,
                    x: state.textPos.x,
                    y: state.textPos.y,
                    ...state.config
                });
                draw();
            }
            hideTextInput();
        } else if (e.key === 'Escape') {
            hideTextInput();
        }
    };

    // --- 鼠标交互 ---
    canvas.onmousedown = (e) => {
        const x = e.offsetX, y = e.offsetY;

        if (state.tool === 'text') {
            showTextInput(x, y);
            return;
        }

        state.isDrawing = true;
        state.undoStack.push(JSON.stringify(state.objects));

        if (state.tool === 'brush') {
            state.tempObj = { type: 'brush', points: [{x, y}], ...state.config };
        } else {
            state.tempObj = { type: state.tool, x, y, w: 0, h: 0, ...state.config };
        }
    };

    canvas.onmousemove = (e) => {
        if (!state.isDrawing) return;
        const x = e.offsetX, y = e.offsetY;

        if (state.tool === 'brush') {
            state.tempObj.points.push({x, y});
        } else if (state.tool === 'rect' || state.tool === 'circle') {
            state.tempObj.w = x - state.tempObj.x;
            state.tempObj.h = y - state.tempObj.y;
        }
        draw();
        if (state.tempObj) renderSingle(state.tempObj);
    };

    canvas.onmouseup = () => {
        if (state.isDrawing) {
            state.objects.push(state.tempObj);
            state.isDrawing = false;
            state.tempObj = null;
            draw();
        }
    };

    // --- 渲染引擎 ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        state.objects.forEach(renderSingle);
    }

    function renderSingle(obj) {
        ctx.beginPath();
        ctx.strokeStyle = obj.color;
        ctx.fillStyle = obj.color;
        ctx.lineWidth = (obj.type === 'text') ? 1 : obj.size;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (obj.type === 'brush') {
            ctx.moveTo(obj.points[0].x, obj.points[0].y);
            obj.points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        } else if (obj.type === 'rect') {
            ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        } else if (obj.type === 'circle') {
            const r = Math.sqrt(obj.w**2 + obj.h**2);
            ctx.arc(obj.x, obj.y, r, 0, Math.PI*2);
            ctx.stroke();
        } else if (obj.type === 'text') {
            ctx.font = `${obj.size}px Arial`;
            ctx.textBaseline = 'middle';
            ctx.fillText(obj.text, obj.x, obj.y);
        }
    }

    // --- 辅助功能 ---
    function handleUndo() {
        if (state.undoStack.length === 0) return;
        state.objects = JSON.parse(state.undoStack.pop());
        draw();
    }

    function getFileName(ext) {
        const prefix = document.getElementById('filePrefix').value || 'board';
        const now = new Date();
        const ts = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + "_" + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
        return `${prefix}_${ts}.${ext}`;
    }

    function doExport() {
        const off = document.createElement('canvas');
        off.width = canvas.width; off.height = canvas.height;
        const oCtx = off.getContext('2d');
        if (document.getElementById('bgType').value === 'white') {
            oCtx.fillStyle = '#ffffff';
            oCtx.fillRect(0, 0, off.width, off.height);
        }
        oCtx.drawImage(canvas, 0, 0);
        const a = document.createElement('a');
        a.href = off.toDataURL('image/png');
        a.download = getFileName('png');
        a.click();
    }

    function saveJSON() {
        const blob = new Blob([JSON.stringify(state.objects)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = getFileName('json');
        a.click();
    }

    function loadJSON(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            state.undoStack.push(JSON.stringify(state.objects));
            state.objects = JSON.parse(e.target.result);
            draw();
        };
        reader.readAsText(input.files[0]);
    }

    function clearAll() {
        if(confirm("确定清空画布？")) {
            state.undoStack.push(JSON.stringify(state.objects));
            state.objects = [];
            draw();
        }
    }
</script>
</body>
</html>
